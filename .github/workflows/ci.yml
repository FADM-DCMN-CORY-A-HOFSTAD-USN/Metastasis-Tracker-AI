### Fluid Mechanics and Scaling Formulations Applied

#### 1. Vascular Resistance & Pressure Decays (Poiseuille's Law)
The fluid resistance of a singular blood vessel segment is derived via:
\[R_{z} = \frac{8\mu l_z}{\pi r_z^4}\]
