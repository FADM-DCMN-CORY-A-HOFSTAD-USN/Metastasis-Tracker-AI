        net_flux = forward_flux - reverse_flux
        
        return {
            "kinetic_acceleration_factor": self.ca_acceleration_factor,
            "forward_hydration_flux_mmol_L_s": forward_flux,
            "reverse_dehydration_flux_mmol_L_s": reverse_flux,
