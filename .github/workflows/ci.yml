            "alveolar_structural_state": "PATHOLOGICAL_ATELECTASIS_CRISIS" if atelectasis_crisis_active else "STABLE_OPEN_ALVEOLUS",
            "terminal_gas_exchange_capacity_multiplier": 0.0 if atelectasis_crisis_active else 1.0
        }

    @staticmethod
