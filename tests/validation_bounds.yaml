# Metastasis-Tracker-AI CI/CD Physiological Numerical Boundary Specifications
metadata:
  target_engine: "src/patient_anatomy.py"
  schema_enforcement: "Strict"

physiological_boundary_limits:
  anthropometrics:
    height_cm:
      min: 50.0
      max: 250.0
    weight_kg:
      min: 3.0
      max: 300.0
    hydration_level_chi:
      min: 0.50
      max: 1.50

  circulatory_network:
    total_generations:
      min: 31
      max: 31
    base_aorta_pressure_mmHg:
      min: 40.0
      max: 240.0
    blood_density_kg_m3:
      min: 1040.0
      max: 1080.0

  biochemical_redox_matrix:
    baseline_serum_calcium_mg_dL:
      min: 5.0
      max: 20.0
    critical_osteolysis_threshold_phi:
      min: 0.10
      max: 0.90
    white_blood_cell_count_uL:
      min: 500.0
      max: 100000.0
